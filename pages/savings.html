<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NI MBAYA | Kenyan Accountability App</title>
    <meta
      name="description"
      content="NI MBAYA is the Kenyan app that remembers what you promised yourself. Build streaks, quit bad habits, save money, and beat Mbaya."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- THIS IS THE SAVINGS SECTION - HOW MUCH YOUR SAVING -->
    <section class="section savings-section" id="calculator">
      <div class="section-heading">
        <span class="section-eyebrow">MONEY SAVED</span>
        <h2>Make your savings feel real.</h2>
      </div>
      <div class="savings-shell">
        <div class="savings-card">
          <label for="dailyAmount">Your daily saving</label>
          <div class="input-group">
            <span>KSh</span>
            <input id="dailyAmount" type="number" min="0" value="200" />
          </div>
          <p class="savings-tip">
            Tip: cut one small habit and watch the savings stack.
          </p>
        </div>
        <div class="savings-results">
          <div class="savings-summary">
            <div>
              <span>30 Days</span>
              <strong id="daysValue">30</strong>
            </div>
            <div>
              <span>Saved</span>
              <strong id="savedValue">KSh 6,000</strong>
            </div>
          </div>
          <div class="savings-items">
            <span>✓ New Shoes</span>
            <span>✓ Gym Membership</span>
            <span>✓ Date Night</span>
            <span>✓ Data Bundles</span>
            <span>✓ Chicken Feed</span>
            <span>✓ Weekend Trip</span>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
