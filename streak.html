<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NI MBAYA | Streaks</title>
    <meta
      name="description"
      content="NI MBAYA is the Kenyan app that remembers what you promised yourself. Build streaks, quit bad habits, save money, and beat Mbaya."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- THIS IS YOUR STREAK JOURNEY SECTION -->
    <section class="section journey-section" id="journey">
      <div class="section-heading">
        <span class="section-eyebrow">STREAK JOURNEY</span>
        <h2>Your roadmap from Day 1 to Legend of the Republic.</h2>
      </div>
      <div class="journey-track">
        <div class="journey-point">
          <span>Day 1</span><strong>The Beginning</strong>
        </div>
        <div class="journey-point">
          <span>Day 7</span><strong>Weekend Survivor</strong>
        </div>
        <div class="journey-point">
          <span>Day 30</span><strong>Certified Discipline</strong>
        </div>
        <div class="journey-point">
          <span>Day 100</span><strong>Village Elder</strong>
        </div>
        <div class="journey-point">
          <span>Day 365</span><strong>Legend of the Republic</strong>
        </div>
      </div>
    </section>
  </body>
</html>
